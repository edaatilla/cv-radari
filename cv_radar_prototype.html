<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>CV Radarı — Prototip</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --paper:#F6F3EC;
  --ink:#1C2333;
  --navy:#1B2A4A;
  --navy-2:#2B3E63;
  --gold:#B8892B;
  --line:#DCD5C6;
  --card:#FFFFFF;
  --tek:#2B6E63;   /* teknoloji */
  --sag:#B04A3C;   /* sağlık */
  --egt:#3A5CA8;   /* eğitim */
  --fin:#8A6D1E;   /* finans */
  --paz:#7A4A8A;   /* pazarlama */
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1180px;margin:0 auto;padding:36px 28px 80px;}

header.app{
  display:flex;justify-content:space-between;align-items:flex-end;
  border-bottom:2px solid var(--navy);
  padding-bottom:18px;margin-bottom:28px;
  flex-wrap:wrap;gap:14px;
}
header.app h1{
  font-family:'Fraunces',serif;
  font-weight:700;
  font-size:34px;
  margin:0;
  color:var(--navy);
  letter-spacing:-0.5px;
}
header.app .tag{
  font-size:13px;color:#6b6656;max-width:360px;line-height:1.4;
}
.upload-trigger{
  display:flex;align-items:center;gap:8px;
  font-family:'Fraunces',serif;font-weight:600;font-size:14.5px;
  background:var(--gold);color:#fff;border:none;
  padding:12px 20px;border-radius:9px;cursor:pointer;
  white-space:nowrap;
  transition:background .15s ease, transform .15s ease;
}
.upload-trigger:hover{background:#a37a26;transform:translateY(-1px);}
.upload-trigger .plus{font-size:17px;font-weight:700;line-height:1;}

.drawer-overlay{
  position:fixed;inset:0;background:rgba(20,20,10,.38);
  opacity:0;pointer-events:none;transition:opacity .25s ease;
  z-index:60;
}
.drawer-overlay.open{opacity:1;pointer-events:auto;}

.drawer{
  position:fixed;top:0;left:0;height:100vh;width:380px;max-width:88vw;
  background:var(--paper);
  border-right:2px solid var(--navy);
  box-shadow:12px 0 30px rgba(20,20,10,.15);
  transform:translateX(-100%);
  transition:transform .3s ease;
  z-index:70;
  padding:26px 22px;
  overflow-y:auto;
}
.drawer.open{transform:translateX(0);}
.drawer-head{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:20px;
  padding-bottom:14px;
  border-bottom:2px solid var(--navy);
}
.drawer-title{font-family:'Fraunces',serif;font-weight:700;font-size:21px;color:var(--navy);}
.drawer-close{
  background:none;border:none;font-size:26px;line-height:1;color:var(--navy);
  cursor:pointer;padding:0 4px;
}

nav.tabs{display:flex;gap:6px;margin-bottom:28px;}
nav.tabs button{
  font-family:'Fraunces',serif;
  font-size:15px;font-weight:600;
  padding:11px 22px;
  border:2px solid var(--navy);
  border-bottom:none;
  background:var(--paper);
  color:var(--navy);
  cursor:pointer;
  border-radius:8px 8px 0 0;
  position:relative;top:2px;
}
nav.tabs button.active{
  background:var(--navy);color:#fff;
}

.panel{display:none;border-top:2px solid var(--navy);padding-top:26px;}
.panel.active{display:block;}

/* ---------- CV YÜKLE ---------- */
.dropzone{
  border:2px dashed var(--navy);
  border-radius:14px;
  background:#fff;
  padding:44px 24px;
  text-align:center;
  cursor:pointer;
  transition:background .15s ease, border-color .15s ease;
}
.dropzone.drag{background:#EFE9DA;border-color:var(--gold);}
.dropzone .dz-title{
  font-family:'Fraunces',serif;font-weight:600;font-size:18px;color:var(--navy);margin-bottom:6px;
}
.dropzone .dz-sub{font-size:12.5px;color:#8a836e;}
.dz-btn{
  display:inline-block;
  margin-top:18px;
  padding:11px 26px;
  background:var(--navy);color:#fff;
  border-radius:9px;
  font-family:'Fraunces',serif;font-weight:600;font-size:14px;
  transition:background .15s ease;
}
.dropzone:hover .dz-btn{background:var(--navy-2);}
.dropzone input{display:none;}

.upload-list{margin-top:22px;display:flex;flex-direction:column;gap:10px;}
.upload-row{
  display:flex;align-items:center;gap:14px;
  background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:12px 16px;
}
.upload-row .fname{
  flex:1;min-width:0;font-size:13.5px;font-weight:600;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.upload-row .status{
  font-size:12px;font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:7px;
}
.spinner{
  width:13px;height:13px;border-radius:50%;
  border:2px solid var(--line);border-top-color:var(--gold);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.badge{
  font-size:11px;font-weight:700;color:#fff;padding:3px 10px;border-radius:20px;
}
.upload-row .extracted{font-size:12px;color:#8a836e;}

/* ---------- KATEGORİLER (yan yana) ---------- */
.cat-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}
@media(max-width:900px){.cat-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.cat-grid{grid-template-columns:1fr;}}

.cat-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 1px 2px rgba(20,20,10,.04);
  display:flex;flex-direction:column;
}
.cat-head{
  padding:14px 16px;
  color:#fff;
  display:flex;justify-content:space-between;align-items:center;
  font-family:'Fraunces',serif;font-weight:600;font-size:16px;
}
.cat-head span.count{
  font-family:'Inter',sans-serif;font-weight:600;font-size:12px;
  background:rgba(255,255,255,.22);
  padding:3px 9px;border-radius:20px;
}
.cat-thumbs{
  padding:14px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.cv-thumb{
  aspect-ratio:3/4;
  border-radius:6px;
  border:1px solid var(--line);
  background:#fff;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:transform .15s ease;
}
.cv-thumb:hover{transform:translateY(-3px);box-shadow:0 6px 14px rgba(20,20,10,.12);}
.cv-thumb .bar{height:26%;width:100%;}
.cv-thumb .avatar{
  width:34%;aspect-ratio:1/1;border-radius:50%;
  background:#fff;border:2px solid rgba(0,0,0,.06);
  position:absolute;top:6%;left:8%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-weight:700;font-size:13px;
}
.cv-thumb .lines{padding:10px 10px 0;}
.cv-thumb .ln{height:5px;background:#E7E3D8;border-radius:3px;margin-bottom:6px;}
.cv-thumb .ln.w60{width:60%;}
.cv-thumb .ln.w80{width:80%;}
.cv-thumb .ln.w40{width:40%;}
.cv-thumb .name-tag{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(28,35,51,.86);color:#fff;
  font-size:10.5px;font-weight:600;
  padding:4px 6px;text-align:center;
  font-family:'Inter',sans-serif;
}

/* ---------- EN UYGUN ADAYLAR ---------- */
.search-row{
  display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;
}
.search-row input{
  flex:1;min-width:260px;
  padding:13px 16px;
  border:2px solid var(--navy);
  border-radius:9px;
  font-size:14px;font-family:'Inter',sans-serif;
  background:#fff;
}
.search-row button{
  padding:13px 24px;
  background:var(--navy);color:#fff;border:none;border-radius:9px;
  font-family:'Fraunces',serif;font-weight:600;font-size:14.5px;
  cursor:pointer;
}
.search-row button:hover{background:var(--navy-2);}
.hint{font-size:12px;color:#8a836e;margin:-16px 0 22px;}

.cand-card{
  display:flex;gap:20px;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:18px;
  margin-bottom:16px;
  box-shadow:0 1px 2px rgba(20,20,10,.04);
}
.cand-photo{
  flex:0 0 118px;
  width:118px;aspect-ratio:3/4;
  border-radius:8px;overflow:hidden;position:relative;border:1px solid var(--line);
}
.cand-body{flex:1;min-width:0;}
.cand-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.cand-name{
  font-family:'Fraunces',serif;font-weight:700;font-size:20px;color:var(--navy);
}
.cand-role{font-size:12.5px;color:#8a836e;margin-top:2px;}
.match{
  font-family:'Fraunces',serif;font-weight:700;font-size:15px;
  color:var(--gold);white-space:nowrap;
}
.ai-note{
  margin-top:12px;
  background:#F1ECE0;
  border-left:3px solid var(--gold);
  padding:10px 13px;
  border-radius:0 8px 8px 0;
  font-size:13px;line-height:1.55;
}
.ai-note b{color:var(--navy);}
.tags{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;}
.tags span{
  font-size:11px;background:var(--paper);border:1px solid var(--line);
  padding:3px 9px;border-radius:20px;color:#5b563f;
}
</style>
</head>
<body>
<div class="wrap">

  <header class="app">
    <div>
      <h1>CV Radarı</h1>
      <div class="tag">Yüklenen CV'leri otomatik kategorize eder, aradığın özelliklere göre en uygun adayları bulur.</div>
    </div>
    <button class="upload-trigger" id="openDrawer">
      <span class="plus">+</span> CV Yükle
    </button>
  </header>

  <nav class="tabs">
    <button class="active" data-tab="uygun">Aday Ara</button>
    <button data-tab="kategoriler">Kategorilere Göre CV'ler</button>
  </nav>

  <!-- ================= ADAY ARA ================= -->
  <section class="panel active" id="uygun">
    <div class="search-row">
      <input id="searchInput" type="text" placeholder="Aranan özellikler (örn: Python, SQL, 3+ yıl deneyim, liderlik)">
      <button onclick="runSearch()">Adayları Bul</button>
    </div>
    <div class="hint">Prototipte arama, adayların etiketleriyle basitçe eşleşir — gerçek sürümde bu kısmı ince ayarlı bir HF modeli (embedding + sınıflandırma) yapacak.</div>
    <div id="candList"></div>
  </section>

  <!-- ================= KATEGORİLER ================= -->
  <section class="panel" id="kategoriler">
    <div class="cat-grid" id="catGrid"></div>
  </section>

</div>

<!-- ================= CV YÜKLE (soldan açılan çekmece) ================= -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<aside class="drawer" id="uploadDrawer">
  <div class="drawer-head">
    <div class="drawer-title">CV Yükle</div>
    <button class="drawer-close" id="closeDrawer">&times;</button>
  </div>
  <label class="dropzone" id="dropzone">
    <div class="dz-title">CV'leri buraya sürükle bırak</div>
    <div class="dz-sub">.pdf, .docx — birden fazla dosya seçebilirsin. Yüklenen her CV otomatik okunup kategoriye ayrılır.</div>
    <span class="dz-btn" type="button">Dosya Seç</span>
    <input type="file" id="fileInput" multiple accept=".pdf,.docx,.doc">
  </label>
  <div class="upload-list" id="uploadList"></div>
</aside>

<script>
const CATS = [
  {key:'tek', name:'Teknoloji', color:'var(--tek)'},
  {key:'sag', name:'Sağlık', color:'var(--sag)'},
  {key:'egt', name:'Eğitim', color:'var(--egt)'},
  {key:'fin', name:'Finans', color:'var(--fin)'},
  {key:'paz', name:'Pazarlama', color:'var(--paz)'},
];

const CANDIDATES = [
  {name:'Derya Yılmaz', role:'Veri Mühendisi', cat:'tek', match:94,
   tags:['Python','SQL','Airflow','ETL'],
   strong:'veri mühendisliği, SQL optimizasyonu ve büyük veri hattı (pipeline) kurulumunda',
   grow:'bulut altyapı (cloud) sertifikasyonu ve takım liderliği deneyiminde'},
  {name:'Emre Kaya', role:'Backend Geliştirici', cat:'tek', match:88,
   tags:['Java','Spring','Docker'],
   strong:'backend mimarisi ve mikroservis tasarımında',
   grow:'frontend teknolojileri ve test otomasyonunda'},
  {name:'Zeynep Aksoy', role:'Hemşire', cat:'sag', match:81,
   tags:['Klinik Bakım','Acil Servis'],
   strong:'acil servis süreçleri ve hasta iletişiminde',
   grow:'dijital sağlık kayıt sistemlerinde'},
  {name:'Mert Demir', role:'Matematik Öğretmeni', cat:'egt', match:76,
   tags:['Eğitim Programı','Ölçme-Değerlendirme'],
   strong:'müfredat geliştirme ve sınıf yönetiminde',
   grow:'uzaktan eğitim araçlarında'},
  {name:'Ayşe Korkmaz', role:'Finansal Analist', cat:'fin', match:72,
   tags:['Excel','Bütçeleme','Raporlama'],
   strong:'finansal modelleme ve raporlamada',
   grow:'ileri düzey veri görselleştirmede'},
  {name:'Can Öztürk', role:'Dijital Pazarlama Uzmanı', cat:'paz', match:69,
   tags:['SEO','Kampanya Yönetimi'],
   strong:'performans pazarlaması ve kampanya optimizasyonunda',
   grow:'içerik stratejisi ve marka yönetiminde'},
];

function initials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2);}

function thumbHTML(c, catColor){
  return `<div class="cv-thumb" title="${c.name}">
    <div class="bar" style="background:${catColor}"></div>
    <div class="avatar" style="color:${catColor}">${initials(c.name)}</div>
    <div class="lines">
      <div class="ln w80"></div><div class="ln w60"></div><div class="ln w40"></div>
      <div class="ln w60"></div><div class="ln w80"></div>
    </div>
    <div class="name-tag">${c.name}</div>
  </div>`;
}

function renderCategories(){
  const grid = document.getElementById('catGrid');
  grid.innerHTML = CATS.map(cat=>{
    const items = CANDIDATES.filter(c=>c.cat===cat.key);
    return `<div class="cat-card">
      <div class="cat-head" style="background:${cat.color}">
        <span>${cat.name}</span><span class="count">${items.length} CV</span>
      </div>
      <div class="cat-thumbs">
        ${items.map(c=>thumbHTML(c, cat.color)).join('') || '<div style="grid-column:1/-1;font-size:12px;color:#999;padding:8px 0;">Bu alanda henüz CV yok</div>'}
      </div>
    </div>`;
  }).join('');
}

function candCardHTML(c){
  const cat = CATS.find(x=>x.key===c.cat);
  return `<div class="cand-card">
    <div class="cand-photo">
      <div class="bar" style="background:${cat.color};height:22%"></div>
      <div class="avatar" style="color:${cat.color}">${initials(c.name)}</div>
      <div class="lines" style="padding:38px 8px 0">
        <div class="ln w80"></div><div class="ln w60"></div><div class="ln w40"></div>
        <div class="ln w60"></div><div class="ln w80"></div><div class="ln w40"></div>
      </div>
    </div>
    <div class="cand-body">
      <div class="cand-top">
        <div>
          <div class="cand-name">${c.name}</div>
          <div class="cand-role">${c.role} · ${cat.name}</div>
        </div>
        <div class="match">%${c.match} uyum</div>
      </div>
      <div class="tags">${c.tags.map(t=>`<span>${t}</span>`).join('')}</div>
      <div class="ai-note">
        <b>Gelişmiş olduğu alanlar:</b> ${c.strong}.<br>
        <b>Gelişime açık alanlar:</b> ${c.grow}.
      </div>
    </div>
  </div>`;
}

function renderCandidates(list){
  document.getElementById('candList').innerHTML =
    list.sort((a,b)=>b.match-a.match).map(candCardHTML).join('');
}

function runSearch(){
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if(!q){renderCandidates(CANDIDATES);return;}
  const terms = q.split(/[,\s]+/).filter(Boolean);
  const scored = CANDIDATES.map(c=>{
    const hay = (c.tags.join(' ') + ' ' + c.role + ' ' + c.strong).toLowerCase();
    const hits = terms.filter(t=>hay.includes(t)).length;
    return {...c, match: hits>0 ? Math.min(99, 60+hits*13) : Math.max(20, c.match-40)};
  }).filter(c=>c.match>30);
  renderCandidates(scored.length?scored:CANDIDATES);
}

/* ---------- CV YÜKLE mantığı ---------- */
const CAT_KEYWORDS = {
  tek:['yazilim','developer','muhendis','yazılım','mühendis','veri','data','it','bilgisayar'],
  sag:['hemsire','hemşire','doktor','saglik','sağlık','klinik','hasta'],
  egt:['ogretmen','öğretmen','egitim','eğitim','akademik','okul'],
  fin:['finans','muhasebe','analist','bütçe','butce','banka'],
  paz:['pazarlama','marketing','reklam','marka','satis','satış'],
};

function guessCategory(filename){
  const f = filename.toLowerCase();
  for(const [key, words] of Object.entries(CAT_KEYWORDS)){
    if(words.some(w=>f.includes(w))) return key;
  }
  const keys = Object.keys(CAT_KEYWORDS);
  return keys[Math.floor(Math.random()*keys.length)];
}

function fakeNameFromFilename(filename){
  let base = filename.replace(/\.[^/.]+$/, '');
  base = base.replace(/^cv[_\-\s]*/i, '');
  const stop = ['cv','ozgecmis','özgeçmiş','resume','muh','mühendis'];
  const words = base.split(/[_\-\s]+/).filter(w=>w && !stop.includes(w.toLowerCase()));
  const name = words.slice(0,2).map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
  return name || 'İsimsiz Aday';
}

const GENERIC_NOTES = [
  {strong:'ilgili alandaki temel yetkinliklerinde', grow:'ileri düzey sertifikasyon ve proje deneyiminde'},
  {strong:'iletişim ve takım çalışmasında', grow:'teknik derinlik gerektiren konularda'},
  {strong:'sektör bilgisi ve uygulama tecrübesinde', grow:'liderlik ve süreç yönetiminde'},
];

let uploadCount = 0;

function handleFiles(files){
  const list = document.getElementById('uploadList');
  Array.from(files).forEach(file=>{
    uploadCount++;
    const rowId = 'up' + uploadCount;
    const row = document.createElement('div');
    row.className = 'upload-row';
    row.id = rowId;
    row.innerHTML = `
      <div class="fname">${file.name}</div>
      <div class="extracted"></div>
      <div class="status"><div class="spinner"></div> İşleniyor…</div>
    `;
    list.prepend(row);

    setTimeout(()=>{
      const catKey = guessCategory(file.name);
      const cat = CATS.find(c=>c.key===catKey);
      const name = fakeNameFromFilename(file.name);
      const note = GENERIC_NOTES[Math.floor(Math.random()*GENERIC_NOTES.length)];

      CANDIDATES.push({
        name, role: cat.name + ' Adayı', cat: catKey,
        match: 55 + Math.floor(Math.random()*30),
        tags:['Yeni Yüklendi'],
        strong: note.strong, grow: note.grow,
      });

      const r = document.getElementById(rowId);
      r.querySelector('.extracted').textContent = name;
      r.querySelector('.status').innerHTML =
        `<span class="badge" style="background:${cat.color}">${cat.name}</span>`;

      renderCategories();
      renderCandidates(CANDIDATES);
    }, 700 + Math.random()*900);
  });
}

const dz = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
fileInput.addEventListener('change', e=>handleFiles(e.target.files));
['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev, e=>{e.preventDefault();dz.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>dz.addEventListener(ev, e=>{e.preventDefault();dz.classList.remove('drag');}));
dz.addEventListener('drop', e=>{ if(e.dataTransfer.files.length) handleFiles(e.dataTransfer.files); });

const drawer = document.getElementById('uploadDrawer');
const overlay = document.getElementById('drawerOverlay');
function openDrawer(){drawer.classList.add('open');overlay.classList.add('open');}
function closeDrawerFn(){drawer.classList.remove('open');overlay.classList.remove('open');}
document.getElementById('openDrawer').addEventListener('click', openDrawer);
document.getElementById('closeDrawer').addEventListener('click', closeDrawerFn);
overlay.addEventListener('click', closeDrawerFn);

document.querySelectorAll('nav.tabs button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});

renderCategories();
renderCandidates(CANDIDATES);
</script>
</body>
</html>
